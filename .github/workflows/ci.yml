# Runs the Dagger CI pipeline on every PR and push to main.
# Dagger handles: gofmt, go vet, golangci-lint, go build, go test (with ClickHouse).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with dagger.io/dagger in ci/go.mod.
  # Used to pre-pull the engine image so a flaky registry doesn't fail CI.
  DAGGER_ENGINE_VERSION: v0.21.7

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: ci/go.mod
          cache: true

      # Cache the Dagger engine image across runs so most CI jobs never hit
      # registry.dagger.io. The key includes the engine version, so a Dagger
      # SDK bump in ci/go.mod automatically invalidates the cache.
      # See https://github.com/guettli/otelhouse/issues/15.
      - name: Cache Dagger engine image
        id: dagger-engine-cache
        uses: actions/cache@v4
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-${{ env.DAGGER_ENGINE_VERSION }}

      # Pre-pull (or restore from cache) the Dagger engine image so transient
      # registry.dagger.io timeouts don't fail the entire run.
      #
      # Per dagger/dagger's RELEASING.md, the canonical publish target is
      # ghcr.io/dagger/engine; registry.dagger.io/engine is a mirror redirect
      # that has been observed to be unreachable from GH Actions runners for
      # minutes at a time. We try GHCR first and retag locally so the Dagger
      # SDK finds the image under its expected name, and fall back to the
      # mirror so a GHCR outage doesn't block us either. Each retry attempt
      # tries both registries before sleeping (exponential backoff, up to
      # ~4 minutes total wait on a cold cache).
      # See https://github.com/guettli/otelhouse/issues/15.
      - name: Pre-pull Dagger engine image
        run: |
          set -eu
          canonical="registry.dagger.io/engine:${DAGGER_ENGINE_VERSION}"
          mirror="ghcr.io/dagger/engine:${DAGGER_ENGINE_VERSION}"
          if [ -f /tmp/dagger-engine.tar ]; then
            echo "Loading engine image from cache" >&2
            docker load -i /tmp/dagger-engine.tar
            exit 0
          fi
          attempt=1
          for backoff in 10 20 30 60 120 0; do
            for src in "$mirror" "$canonical"; do
              if docker pull "$src"; then
                if [ "$src" != "$canonical" ]; then
                  docker tag "$src" "$canonical"
                fi
                docker save "$canonical" -o /tmp/dagger-engine.tar
                exit 0
              fi
            done
            if [ "$backoff" -eq 0 ]; then
              break
            fi
            echo "pull attempt $attempt failed on both registries; retrying in ${backoff}s" >&2
            sleep "$backoff"
            attempt=$((attempt + 1))
          done
          echo "pull failed after $attempt attempts (both registries)" >&2
          exit 1

      - name: Run Dagger pipeline
        run: cd ci && go run .
