# Runs the Dagger CI pipeline on every PR and push to main.
# Dagger handles: gofmt, go vet, golangci-lint, go build, go test (with ClickHouse).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache ci module deps
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-ci-${{ hashFiles('ci/go.sum') }}
          restore-keys: go-ci-

      - name: Run Dagger pipeline
        run: cd ci && go run .
